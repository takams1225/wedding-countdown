<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takahiro & Moka Wedding Countdown</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;color:#e8c98a;background:#111}
body{
  min-height:100vh;
  background-image:linear-gradient(rgba(0,0,0,.18),rgba(0,0,0,.60)),url("photo.jpg");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px 16px;
}
.card{
  width:min(92vw,560px);
  padding:32px 18px 28px;
  border-radius:28px;
  background:rgba(0,0,0,.18);
}
.names{
  font-family:Georgia,"Times New Roman",serif;
  font-size:clamp(38px,9vw,72px);
  font-style:italic;
  letter-spacing:.04em;
  line-height:1.1;
  margin-bottom:22px;
}
.lead{
  font-size:18px;
  letter-spacing:.35em;
  color:#f1dba8;
  margin-bottom:34px;
}
.count{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-bottom:28px;
}
.unit{
  min-width:78px;
  padding:10px 6px;
  border-left:1px solid rgba(232,201,138,.45);
}
.unit:first-child{border-left:none}
.num{
  font-family:Georgia,"Times New Roman",serif;
  font-size:clamp(38px,11vw,64px);
  line-height:1;
}
.cap{
  margin-top:8px;
  font-size:12px;
  letter-spacing:.18em;
}
.date{
  font-family:Georgia,"Times New Roman",serif;
  font-size:28px;
  letter-spacing:.16em;
  margin-top:20px;
}
.venue{
  margin-top:18px;
  font-size:20px;
  letter-spacing:.16em;
}
.done{display:none;font-size:28px;line-height:1.7;color:#fff}
@media(max-width:430px){
  .count{gap:4px}
  .unit{min-width:72px}
  .lead{font-size:15px}
}
</style>
</head>
<body>
<main class="card">
  <div id="countdown">
    <div class="names">Takahiro &amp; Moka</div>
    <div class="lead">結婚式まであと</div>
    <div class="count">
      <div class="unit"><div class="num" id="days">0</div><div class="cap">DAYS</div></div>
      <div class="unit"><div class="num" id="hours">00</div><div class="cap">HOURS</div></div>
      <div class="unit"><div class="num" id="minutes">00</div><div class="cap">MINUTES</div></div>
      <div class="unit"><div class="num" id="seconds">00</div><div class="cap">SECONDS</div></div>
    </div>
    <div class="date">2026.08.08 Sat</div>
    <div class="venue">St. Grace Villa</div>
  </div>
  <div class="done" id="done">
    Today is our Wedding Day<br>
    Thank you for coming!
  </div>
</main>
<script>
const target = new Date("2026-08-08T14:40:00+09:00").getTime();
function pad(n){return String(n).padStart(2,"0")}
function update(){
  const d = target - Date.now();
  if(d <= 0){
    document.getElementById("countdown").style.display="none";
    document.getElementById("done").style.display="block";
    return;
  }
  document.getElementById("days").textContent = Math.floor(d/86400000);
  document.getElementById("hours").textContent = pad(Math.floor(d/3600000)%24);
  document.getElementById("minutes").textContent = pad(Math.floor(d/60000)%60);
  document.getElementById("seconds").textContent = pad(Math.floor(d/1000)%60);
}
update();
setInterval(update,1000);
</script>
</body>
</html>
