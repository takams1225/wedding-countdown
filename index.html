<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takahiro & Moka Wedding Countdown</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;
      color: #fff;
      background: #111;
    }
    body {
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(0,0,0,.18), rgba(0,0,0,.62)),
        url("photo.jpg");
      background-size: cover;
      background-position: center center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px 18px;
    }
    .card {
      width: min(92vw, 430px);
      padding: 34px 22px 30px;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: 28px;
      background: rgba(20, 20, 20, .28);
      backdrop-filter: blur(4px);
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
    }
    .names {
      font-size: 30px;
      letter-spacing: .08em;
      margin-bottom: 10px;
      line-height: 1.25;
    }
    .subtitle {
      font-family: "Times New Roman", serif;
      font-size: 20px;
      letter-spacing: .12em;
      opacity: .94;
      margin-bottom: 24px;
    }
    .label {
      font-size: 22px;
      letter-spacing: .18em;
      margin-bottom: 16px;
    }
    .days {
      font-size: clamp(56px, 17vw, 82px);
      line-height: 1;
      font-weight: 500;
      letter-spacing: .04em;
      margin-bottom: 6px;
    }
    .days span {
      font-size: 22px;
      margin-left: 4px;
      letter-spacing: .12em;
    }
    .time {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 18px 0 26px;
      font-family: "Times New Roman", serif;
    }
    .unit {
      min-width: 74px;
      padding: 10px 8px;
      border-radius: 16px;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.28);
    }
    .num {
      font-size: 28px;
      line-height: 1;
    }
    .cap {
      margin-top: 6px;
      font-size: 11px;
      letter-spacing: .14em;
      opacity: .9;
    }
    .date {
      font-family: "Times New Roman", serif;
      font-size: 24px;
      letter-spacing: .13em;
      margin-top: 10px;
    }
    .message {
      margin-top: 16px;
      font-size: 16px;
      letter-spacing: .05em;
      line-height: 1.7;
    }
    .done {
      font-size: 28px;
      line-height: 1.6;
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div id="countdown">
      <div class="names">Takahiro &amp; Moka</div>
      <div class="subtitle">Wedding Day</div>
      <div class="label">あと</div>
      <div class="days"><span id="days">0</span><span>日</span></div>
      <div class="time">
        <div class="unit"><div class="num" id="hours">00</div><div class="cap">HOURS</div></div>
        <div class="unit"><div class="num" id="minutes">00</div><div class="cap">MIN</div></div>
        <div class="unit"><div class="num" id="seconds">00</div><div class="cap">SEC</div></div>
      </div>
      <div class="date">2026.08.08</div>
      <div class="message">Let's celebrate together!</div>
    </div>
    <div class="done" id="done">Today is our Wedding Day<br>Thank you for coming!</div>
  </main>
  <script>
    const target = new Date("2026-08-08T14:40:00+09:00").getTime();
    function pad(n) { return String(n).padStart(2, "0"); }
    function updateCountdown() {
      const distance = target - Date.now();
      if (distance <= 0) {
        document.getElementById("countdown").style.display = "none";
        document.getElementById("done").style.display = "block";
        return;
      }
      document.getElementById("days").textContent = Math.floor(distance / 86400000);
      document.getElementById("hours").textContent = pad(Math.floor(distance / 3600000) % 24);
      document.getElementById("minutes").textContent = pad(Math.floor(distance / 60000) % 60);
      document.getElementById("seconds").textContent = pad(Math.floor(distance / 1000) % 60);
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
